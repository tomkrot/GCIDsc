# ---------------------------------------------------------------------------
# GoogleWorkspaceDsc — Azure DevOps Pipeline (Cross-Platform)
# ---------------------------------------------------------------------------
# Uses PowerShell Core (pwsh) for all script steps, which runs identically
# on both Linux and Windows self-hosted agents.
#
# Variables (set in Azure DevOps Library / Variable Group "gwsdsc"):
#   GWS_DELEGATED_ADMIN       — admin email for domain-wide delegation
#   GWS_CUSTOMER_ID           — Google Workspace customer ID
#   GWS_PRIMARY_DOMAIN        — primary domain
#   GWS_TENANT_NAME           — display name for reports
#   AZURE_VAULT_URL           — https://your-vault.vault.azure.net
#
# Secrets (linked from Azure Key Vault):
#   The variable group "gwsdsc" should be linked to an Azure Key Vault
#   containing the service account key as a secret named "gwsdsc-sa-key".
# ---------------------------------------------------------------------------

parameters:
  - name: agentPool
    displayName: "Agent pool"
    type: string
    default: "ubuntu-latest"
    values:
      - ubuntu-latest
      - windows-latest
      - Default            # self-hosted pool name

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - config/**
      - src/**

schedules:
  - cron: "0 2 * * *"
    displayName: "Nightly export"
    branches:
      include:
        - main
    always: true

pr: none

pool:
  vmImage: ${{ parameters.agentPool }}

variables:
  - group: gwsdsc
  - name: pythonVersion
    value: "3.12"
  - name: artifactsDir
    value: "$(Build.SourcesDirectory)/artifacts"

stages:
  # ===========================================================================
  # Stage 1 — Export
  # ===========================================================================
  - stage: Export
    displayName: "Export Google Workspace Configuration"
    jobs:
      - job: ExportJob
        displayName: "Run gwsdsc export"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - pwsh: |
              python -m pip install --upgrade pip
              pip install -e ".[azure]"
            displayName: "Install gwsdsc (with Azure Key Vault support)"

          - pwsh: |
              $config = @"
              tenant_name: "$(GWS_TENANT_NAME)"
              customer_id: "$(GWS_CUSTOMER_ID)"
              primary_domain: "$(GWS_PRIMARY_DOMAIN)"
              credentials:
                type: service_account
                secret_backend: azure_key_vault
                azure_vault_url: "$(AZURE_VAULT_URL)"
                azure_secret_name: "gwsdsc-sa-key"
                delegated_admin_email: "$(GWS_DELEGATED_ADMIN)"
              store:
                type: git
                path: artifacts
                git_remote: origin
                git_branch: main
              resources:
                - all
              exclude_resources: []
              "@
              New-Item -ItemType Directory -Path config -Force | Out-Null
              $config | Set-Content -Path config/tenant.yaml -Encoding utf8
            displayName: "Generate tenant config"

          - pwsh: |
              gwsdsc export --config config/tenant.yaml --output "$(artifactsDir)/current"
            displayName: "Execute export"

          - publish: $(artifactsDir)/current
            artifact: gws-snapshot
            displayName: "Publish snapshot artifact"

  # ===========================================================================
  # Stage 2 — Diff & Report
  # ===========================================================================
  - stage: Diff
    displayName: "Differential Analysis & Drift Report"
    dependsOn: Export
    jobs:
      - job: DiffJob
        displayName: "Run gwsdsc diff"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - pwsh: |
              pip install -e ".[dev]"
            displayName: "Install gwsdsc"

          - download: current
            artifact: gws-snapshot
            displayName: "Download current snapshot"

          - pwsh: |
              # Find the previous export tag
              $prevTag = git tag -l 'export/*' --sort=-creatordate | Select-Object -First 1
              if (-not $prevTag) {
                Write-Host "No previous export tag found. Skipping diff."
                Write-Host "##vso[task.setvariable variable=skipDiff]true"
                exit 0
              }

              # Checkout previous snapshot
              git checkout $prevTag -- artifacts/ 2>$null
              $prevDir = "artifacts/previous"
              New-Item -ItemType Directory -Path $prevDir -Force | Out-Null

              # Find the timestamped snapshot directory
              Get-ChildItem -Path artifacts -Directory |
                Where-Object { $_.Name -notin @('latest','previous','current') } |
                Select-Object -First 1 |
                ForEach-Object {
                  Copy-Item -Path (Join-Path $_.FullName '*') -Destination $prevDir -Recurse -Force
                }

              Write-Host "##vso[task.setvariable variable=prevDir]$prevDir"
            displayName: "Resolve previous snapshot"

          - pwsh: |
              if ("$(skipDiff)" -eq "true") {
                Write-Host "Skipping diff — no previous snapshot."
                exit 0
              }
              gwsdsc diff `
                --baseline "$(prevDir)" `
                --target "$(Pipeline.Workspace)/gws-snapshot" `
                --report html `
                --output "$(Build.ArtifactStagingDirectory)/drift-report.html"
            displayName: "Run diff + generate report"

          - publish: $(Build.ArtifactStagingDirectory)
            artifact: drift-report
            displayName: "Publish drift report"
            condition: ne(variables.skipDiff, 'true')

  # ===========================================================================
  # Stage 3 — Commit to Git
  # ===========================================================================
  - stage: Commit
    displayName: "Commit Snapshot to Repository"
    dependsOn: Diff
    jobs:
      - job: CommitJob
        displayName: "Git commit + tag"
        steps:
          - checkout: self
            persistCredentials: true

          - download: current
            artifact: gws-snapshot

          - pwsh: |
              $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHHmmss'Z'")
              $target = "artifacts/$timestamp"
              New-Item -ItemType Directory -Path $target -Force | Out-Null
              Copy-Item -Path "$(Pipeline.Workspace)/gws-snapshot/*" -Destination $target -Recurse

              # Write latest.json pointer (cross-platform, no symlinks)
              @{ path = (Resolve-Path $target).Path; name = $timestamp } |
                ConvertTo-Json | Set-Content -Path "artifacts/latest.json" -Encoding utf8

              git config user.email "gwsdsc-pipeline@devops.azure.com"
              git config user.name "GoogleWorkspaceDsc Pipeline"
              git add artifacts/
              git commit -m "gwsdsc export $timestamp"
              git tag "export/$timestamp"
              git push origin HEAD:main --tags
            displayName: "Commit and tag snapshot"

  # ===========================================================================
  # Stage 4 — Apply (manual gate)
  # ===========================================================================
  - stage: Apply
    displayName: "Apply Configuration (Gated)"
    dependsOn: Commit
    condition: and(succeeded(), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - deployment: ApplyJob
        displayName: "Apply with approval"
        environment: "gws-production"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: "$(pythonVersion)"

                - pwsh: |
                    pip install -e ".[azure]"
                  displayName: "Install gwsdsc"

                - download: current
                  artifact: gws-snapshot

                - pwsh: |
                    gwsdsc apply `
                      --config config/tenant.yaml `
                      --source "$(Pipeline.Workspace)/gws-snapshot" `
                      --plan
                  displayName: "Dry-run plan"

                - pwsh: |
                    gwsdsc apply `
                      --config config/tenant.yaml `
                      --source "$(Pipeline.Workspace)/gws-snapshot" `
                      --confirm
                  displayName: "Apply changes"
